<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>EXECUTIVE Personal Planner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: rgba(212,168,83,0.15); touch-action: manipulation; }
  html, body, #root { height: 100%; width: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: #0f172a; color: #f1f5f9; overflow: hidden;
    padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
  }
  input, select, textarea, button { font-family: inherit; font-size: 16px; -webkit-appearance: none; border-radius: 0; }
  select { -webkit-appearance: menulist; border-radius: 8px; }
  input[type="checkbox"] { -webkit-appearance: checkbox; accent-color: #d4a853; width: 22px; height: 22px; cursor: pointer; }
  button { cursor: pointer; -webkit-user-select: none; user-select: none; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #1e293b; }
  ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  /* iOS scroll fix */
  .scroll-area { -webkit-overflow-scrolling: touch; overflow-y: auto; overflow-x: hidden; }
  .scroll-area-x { -webkit-overflow-scrolling: touch; overflow-x: auto; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useCallback, useEffect, Fragment, useMemo } = React;

/* ===== Responsive hook ===== */
const useIsMobile = function(breakpoint) {
  var bp = breakpoint || 900;
  var _s = useState(window.innerWidth < bp);
  var m = _s[0], sM = _s[1];
  useEffect(function() {
    var h = function() { sM(window.innerWidth < bp); };
    window.addEventListener("resize", h);
    return function() { window.removeEventListener("resize", h); };
  }, [bp]);
  return m;
};

/* ===== localStorage helpers ===== */
var STORAGE_KEY = "executive_planner_data";
var loadData = function() { try { var d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : null; } catch(e) { return null; } };
var saveData = function(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {} };

/* ===== SVG ICONS ===== */
var icons = {
  home: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>; },
  calendar: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>; },
  checkSquare: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>; },
  bookOpen: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>; },
  target: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>; },
  roadmap: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>; },
  plus: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>; },
  x: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>; },
  edit: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>; },
  trash: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>; },
  search: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>; },
  download: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>; },
  upload: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>; },
  chevronLeft: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>; },
  chevronRight: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>; },
  clock: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>; },
  tag: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>; },
  filter: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>; },
  barChart: function(sz,c) { return <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>; },
};
var I = function(props) {
  var fn = icons[props.name];
  var sz = props.size || 18;
  var c = props.color || "currentColor";
  return fn ? <span style={{display:"inline-flex",alignItems:"center",verticalAlign:"middle",lineHeight:0}}>{fn(sz,c)}</span> : null;
};

/* ===== SHARED CATEGORIES ===== */
var CATEGORIES = [
  { key: "machitsuku", label: "街ツク", color: "#3b82f6" },
  { key: "university", label: "大学",   color: "#8b5cf6" },
  { key: "jobhunt",    label: "就活",   color: "#f59e0b" },
  { key: "hobby",      label: "趣味",   color: "#22c55e" },
  { key: "life",       label: "生活",   color: "#ec4899" },
  { key: "ai",         label: "AI",     color: "#06b6d4" },
];
var catLabel = {}; CATEGORIES.forEach(function(c) { catLabel[c.key] = c.label; });
var catColor = {}; CATEGORIES.forEach(function(c) { catColor[c.key] = c.color; });
var CatOptions = function() { return CATEGORIES.map(function(c) { return <option key={c.key} value={c.key}>{c.label}</option>; }); };

/* ===== DATA ===== */
var today = new Date();
var fmt = function(d) { return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
var todayStr = fmt(today);

var SAMPLE_EVENTS = [
  {id:1,title:"ゼミ発表準備",date:todayStr,startTime:"10:00",endTime:"12:00",category:"university",memo:"資料を仕上げる"},
  {id:2,title:"ES添削",date:todayStr,startTime:"14:00",endTime:"15:30",category:"jobhunt",memo:"志望動機の修正"},
  {id:3,title:"ChatGPT API実装",date:todayStr,startTime:"19:00",endTime:"21:00",category:"ai",memo:""},
];
var SAMPLE_TASKS = [
  {id:1,title:"レポート提出",deadline:todayStr,category:"university",done:false},
  {id:2,title:"企業リサーチ5社",deadline:fmt(new Date(today.getTime()+86400000*2)),category:"jobhunt",done:false},
  {id:3,title:"散歩コース開拓",deadline:fmt(new Date(today.getTime()+86400000*5)),category:"hobby",done:false},
  {id:4,title:"LLM論文を読む",deadline:todayStr,category:"ai",done:true},
];
var SAMPLE_NOTES = [
  {id:1,date:todayStr,content:"今日のゼミで新しいアイデアが出た。来週までに具体化する。",tags:["大学","アイデア"]},
  {id:2,date:fmt(new Date(today.getTime()-86400000)),content:"面接練習のフィードバック。結論から話すことを意識する。",tags:["就活","面接"]},
];
var SAMPLE_HABITS = [
  {id:1,name:"読書",frequency:"daily",category:"hobby"},
  {id:2,name:"散歩",frequency:"daily",category:"life"},
];
var genSampleLog = function() {
  var log={};
  SAMPLE_HABITS.forEach(function(h){log[h.id]={};for(var i=0;i<7;i++){log[h.id][fmt(new Date(today.getTime()-i*86400000))]=Math.random()>0.3;}});
  return log;
};

/* ===== THEME ===== */
var C = {
  bg:"#0f172a",bgCard:"#1e293b",bgHover:"#334155",bgInput:"#0f172a",
  gold:"#d4a853",goldBright:"#e8c36a",
  text:"#f1f5f9",textDim:"#94a3b8",textMuted:"#64748b",
  border:"#334155",
  red:"#ef4444",green:"#22c55e",
};
var DAYS_JP=["日","月","火","水","木","金","土"];
var MONTHS_JP=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
var getDIM=function(y,m){return new Date(y,m+1,0).getDate();};
var getFDM=function(y,m){return new Date(y,m,1).getDay();};
var nid=100; var gid=function(){return ++nid;};

/* safe access helper for optional chaining replacement */
var sa = function(obj, key) { return obj ? obj[key] : undefined; };

/* ===== STYLES ===== */
var S={
  app:{display:"flex",height:"100vh",overflow:"hidden"},
  appMobile:{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"},
  sidebar:{width:220,background:C.bgCard,borderRight:"1px solid "+C.border,display:"flex",flexDirection:"column",flexShrink:0},
  bottomBar:{background:C.bgCard,borderTop:"1px solid "+C.border,display:"flex",justifyContent:"space-around",padding:"4px 0 calc(4px + env(safe-area-inset-bottom))",flexShrink:0},
  bottomItem:function(a){return {display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"4px 2px",cursor:"pointer",color:a?C.gold:C.textMuted,fontSize:9,fontWeight:a?600:400,background:"transparent",border:"none",flex:1,WebkitTapHighlightColor:"transparent"};},
  navItem:function(a){return {display:"flex",alignItems:"center",gap:12,padding:"12px 20px",cursor:"pointer",background:a?C.bgHover:"transparent",color:a?C.gold:C.textDim,borderLeft:a?"3px solid "+C.gold:"3px solid transparent",transition:"all 0.2s",fontSize:14,fontWeight:a?600:400,border:"none",width:"100%",textAlign:"left"};},
  main:{flex:1,overflow:"auto",padding:32,WebkitOverflowScrolling:"touch"},
  mainMobile:{flex:1,overflow:"auto",padding:16,WebkitOverflowScrolling:"touch"},
  card:{background:C.bgCard,borderRadius:12,padding:24,marginBottom:16,border:"1px solid "+C.border},
  cardSm:{background:C.bgCard,borderRadius:8,padding:16,marginBottom:12,border:"1px solid "+C.border},
  btn:function(c){return {background:c||C.gold,color:(c||C.gold)===C.gold?C.bg:"#fff",border:"none",borderRadius:8,padding:"10px 16px",cursor:"pointer",fontWeight:600,fontSize:13,display:"inline-flex",alignItems:"center",gap:6};},
  btnO:{background:"transparent",color:C.gold,border:"1px solid "+C.gold,borderRadius:8,padding:"10px 16px",cursor:"pointer",fontWeight:600,fontSize:13,display:"inline-flex",alignItems:"center",gap:6,justifyContent:"center"},
  btnI:{background:"transparent",color:C.textDim,border:"none",cursor:"pointer",padding:6,display:"inline-flex",alignItems:"center",minWidth:32,minHeight:32,justifyContent:"center"},
  inp:{background:C.bgInput,border:"1px solid "+C.border,borderRadius:8,padding:"10px 12px",color:C.text,fontSize:16,width:"100%",outline:"none",boxSizing:"border-box"},
  sel:{background:C.bgInput,border:"1px solid "+C.border,borderRadius:8,padding:"10px 12px",color:C.text,fontSize:16,outline:"none"},
  ta:{background:C.bgInput,border:"1px solid "+C.border,borderRadius:8,padding:"10px 12px",color:C.text,fontSize:16,width:"100%",outline:"none",resize:"vertical",minHeight:100,boxSizing:"border-box",fontFamily:"inherit"},
  badge:function(c){return {background:c+"22",color:c,borderRadius:12,padding:"2px 10px",fontSize:11,fontWeight:600,display:"inline-block"};},
  modal:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16},
  mc:{background:C.bgCard,borderRadius:16,padding:24,width:420,maxWidth:"100%",border:"1px solid "+C.border,maxHeight:"80vh",overflow:"auto",WebkitOverflowScrolling:"touch"},
  g2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12},
  fb:{display:"flex",justifyContent:"space-between",alignItems:"center"},
  fg:function(g){return {display:"flex",gap:g||8,alignItems:"center"};},
  tg:{background:C.bgHover,color:C.goldBright,borderRadius:12,padding:"2px 10px",fontSize:11,fontWeight:500},
  nd:{color:C.textMuted,textAlign:"center",padding:32,fontSize:14},
  lbl:{fontSize:12,color:C.textMuted,marginBottom:4,display:"block"},
};

/* ===== MODAL ===== */
var Modal=function(props){
  var title=props.title, onClose=props.onClose, children=props.children;
  return <div style={S.modal} onClick={onClose}>
    <div style={S.mc} onClick={function(e){e.stopPropagation();}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h3 style={{fontSize:18,fontWeight:700,color:C.gold}}>{title}</h3>
        <button style={S.btnI} onClick={onClose}><I name="x" size={20}/></button>
      </div>
      {children}
    </div>
  </div>;
};

/* ===== DASHBOARD ===== */
var Dashboard=function(props){
  var events=props.events, tasks=props.tasks, habits=props.habits, habitLog=props.habitLog, notes=props.notes, mobile=props.mobile;
  var tEv=events.filter(function(e){return e.date===todayStr;}).sort(function(a,b){return (a.startTime||"").localeCompare(b.startTime||"");}).slice(0,4);
  var pend=tasks.filter(function(t){return !t.done;}).length;
  var hDone=habits.filter(function(h){return sa(sa(habitLog,h.id),todayStr);}).length;
  var hRate=habits.length>0?Math.round(hDone/habits.length*100):0;
  var sorted=[].concat(notes).sort(function(a,b){return b.date.localeCompare(a.date);});
  var ln=sorted[0];
  return <div>
    <div style={{marginBottom:32}}>
      <div style={{fontSize:14,color:C.textMuted,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>TODAY</div>
      <div style={{fontSize:mobile?28:36,fontWeight:800}}>{today.getFullYear()}年{today.getMonth()+1}月{today.getDate()}日</div>
      <div style={{fontSize:18,color:C.gold,fontWeight:600}}>{DAYS_JP[today.getDay()]}曜日</div>
    </div>
    <div style={mobile?{display:"flex",flexDirection:"column",gap:16}:S.g2}>
      <div style={S.card}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16}}><I name="calendar" size={18} color={C.gold}/><span style={{fontWeight:600,color:C.gold}}>今日の予定</span></div>
        {tEv.length===0?<div style={S.nd}>予定なし</div>:tEv.map(function(ev){return <div key={ev.id} style={{display:"flex",gap:12,alignItems:"center",marginBottom:10}}>
          <span style={{color:C.textMuted,fontSize:12,minWidth:90}}>{ev.startTime} - {ev.endTime}</span>
          <span style={{width:3,height:20,borderRadius:2,background:catColor[ev.category]||C.gold}}/>
          <span style={{fontSize:14}}>{ev.title}</span>
        </div>;})}
      </div>
      <div style={S.card}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16}}><I name="checkSquare" size={18} color={C.gold}/><span style={{fontWeight:600,color:C.gold}}>タスク状況</span></div>
        <div style={{fontSize:48,fontWeight:800,color:pend>0?C.gold:C.green}}>{pend}</div>
        <div style={{fontSize:13,color:C.textDim}}>未完了のタスク</div>
      </div>
      <div style={S.card}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16}}><I name="target" size={18} color={C.gold}/><span style={{fontWeight:600,color:C.gold}}>今日の習慣</span></div>
        <div style={{fontSize:48,fontWeight:800,color:hRate>=80?C.green:hRate>=50?C.gold:C.textDim}}>{hRate}%</div>
        <div style={{background:C.bgHover,borderRadius:8,height:8,marginTop:8,overflow:"hidden"}}><div style={{background:C.gold,height:"100%",width:hRate+"%",borderRadius:8,transition:"width 0.5s"}}/></div>
        <div style={{fontSize:12,color:C.textDim,marginTop:6}}>{hDone}/{habits.length} 達成</div>
      </div>
      <div style={S.card}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16}}><I name="bookOpen" size={18} color={C.gold}/><span style={{fontWeight:600,color:C.gold}}>最新のメモ</span></div>
        {ln?<div><div style={{fontSize:12,color:C.textMuted,marginBottom:6}}>{ln.date}</div><div style={{fontSize:14,color:C.textDim,lineHeight:1.6}}>{ln.content.slice(0,80)}{ln.content.length>80?"...":""}</div></div>:<div style={S.nd}>メモなし</div>}
      </div>
    </div>
  </div>;
};

/* ===== SCHEDULE ===== */
var Schedule=function(props){
  var events=props.events, setEvents=props.setEvents;
  var _vd=useState(new Date(today)), vd=_vd[0], setVd=_vd[1];
  var _sel=useState(todayStr), sel=_sel[0], setSel=_sel[1];
  var _sm=useState(false), sm=_sm[0], setSm=_sm[1];
  var _ee=useState(null), ee=_ee[0], setEe=_ee[1];
  var _f=useState({title:"",startTime:"",endTime:"",category:"university",memo:""}), f=_f[0], sF=_f[1];
  var y=vd.getFullYear(), m=vd.getMonth(), dim=getDIM(y,m), fd=getFDM(y,m);
  var prev=function(){setVd(new Date(y,m-1,1));};
  var next=function(){setVd(new Date(y,m+1,1));};
  var oA=function(){setEe(null);sF({title:"",startTime:"",endTime:"",category:"university",memo:""});setSm(true);};
  var oE=function(ev){setEe(ev);sF({title:ev.title,startTime:ev.startTime,endTime:ev.endTime,category:ev.category,memo:ev.memo});setSm(true);};
  var save=function(){if(!f.title)return;if(ee){setEvents(function(p){return p.map(function(e){return e.id===ee.id?Object.assign({},e,f):e;});});}else{setEvents(function(p){return p.concat([Object.assign({id:gid(),date:sel},f)]);});}setSm(false);};
  var rm=function(id){setEvents(function(p){return p.filter(function(e){return e.id!==id;});});};
  var dEv=events.filter(function(e){return e.date===sel;}).sort(function(a,b){return (a.startTime||"").localeCompare(b.startTime||"");});
  var cells=[];for(var i=0;i<fd;i++)cells.push(null);for(var d=1;d<=dim;d++)cells.push(d);
  return <div>
    <div style={S.fb}><h2 style={{fontSize:24,fontWeight:700,marginBottom:24}}>スケジュール</h2><button style={S.btn()} onClick={oA}><I name="plus" size={14} color={C.bg}/> 追加</button></div>

    else{setRoadmapRanges(function(p){return p.concat([Object.assign({id:gid()},rF)]);});}
    setRangeModal(false);
  };
  var rmRange=function(id){setRoadmapRanges(function(p){return p.filter(function(r){return r.id!==id;});});};
  var itemsByMonth=useMemo(function(){
    var map={};
    roadmapItems.forEach(function(it){if(!map[it.month])map[it.month]=[];map[it.month].push(it);});
    return map;
  },[roadmapItems]);
  var sortedRanges=useMemo(function(){
    return [].concat(roadmapRanges).sort(function(a,b){
      var ai=monthIdx(a.startMonth), bi=monthIdx(b.startMonth);
      if(ai!==bi)return ai-bi;
      return monthIdx(b.endMonth)-monthIdx(a.endMonth);
    });
  },[roadmapRanges,allMonths]);
  var rangeLanes=useMemo(function(){
    var assignments=new Map();var laneCount=0;
    sortedRanges.forEach(function(r){
      var si=monthIdx(r.startMonth), ei=monthIdx(r.endMonth);
      var lane=0;
      while(true){
        var conflict=false;
        assignments.forEach(function(val){
          if(val.lane===lane&&!(ei<val.si||si>val.ei))conflict=true;
        });
        if(!conflict)break;lane++;
      }
      assignments.set(r.id,{si:si,ei:ei,lane:lane});
      if(lane+1>laneCount)laneCount=lane+1;
    });
    return {assignments:assignments,laneCount:laneCount};
  },[sortedRanges,allMonths]);
  var RANGE_BAR_H=28, RANGE_LANE_GAP=4;
  var rangeAreaH=rangeLanes.laneCount>0?rangeLanes.laneCount*(RANGE_BAR_H+RANGE_LANE_GAP):0;
  return <div>
    <div style={S.fb}>
      <h2 style={{fontSize:24,fontWeight:700,marginBottom:24}}>長期計画</h2>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <button style={S.btn()} onClick={function(){openAddItem(null);}}><I name="plus" size={14} color={C.bg}/> 追加</button>
        <button style={S.btnO} onClick={openAddRange}>⇔ 期間</button>
      </div>
    </div>
    <div style={{fontSize:12,color:C.textMuted,marginBottom:16}}>2026年4月 〜 2029年3月</div>
    {rangeAreaH>0&&<div style={{background:C.bgCard,borderRadius:"12px 12px 0 0",padding:16,border:"1px solid "+C.border,borderBottom:"none",position:"relative",overflow:"hidden"}}>
      <div style={{fontSize:12,color:C.textMuted,marginBottom:8,fontWeight:600}}>期間バー（⇔）</div>
      <div style={{position:"relative",height:rangeAreaH}}>
        {sortedRanges.map(function(r){
          var info=rangeLanes.assignments.get(r.id);
          if(!info)return null;
          var si=info.si, ei=info.ei, lane=info.lane;
          var totalM=allMonths.length;
          var leftPct=(si/totalM*100)+"%";
          var widthPct=((ei-si+1)/totalM*100)+"%";
          var top=lane*(RANGE_BAR_H+RANGE_LANE_GAP);
          var color=catColor[r.category]||C.gold;
          return <button key={r.id} style={{position:"absolute",left:leftPct,width:widthPct,top:top,height:RANGE_BAR_H,background:color+"33",border:"2px solid "+color,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",gap:4,cursor:"pointer",overflow:"hidden",whiteSpace:"nowrap",padding:0}} onClick={function(){openEditRange(r);}}>
            <span style={{fontSize:11,fontWeight:700,color:color,padding:"0 28px 0 8px",overflow:"hidden",textOverflow:"ellipsis"}}>⇔ {r.text}</span>
            <button style={{position:"absolute",right:2,top:2,padding:2,background:"transparent",border:"none",cursor:"pointer"}} onClick={function(e){e.stopPropagation();rmRange(r.id);}}><I name="x" size={12} color={color}/></button>
          </button>;
        })}
      </div>
    </div>}
    <div style={{background:C.bgCard,borderRadius:rangeAreaH>0?"0 0 12px 12px":"12px",border:"1px solid "+C.border,overflow:"hidden"}}>
      {allMonths.map(function(mo,idx){
        var isCur=mo.key===curMonthKey;
        var isPast=mo.key<curMonthKey;
        var items=itemsByMonth[mo.key]||[];
        var isYearStart=mo.m===4;
        return <Fragment key={mo.key}>
          {isYearStart&&idx>0&&<div style={{background:C.gold+"22",padding:"8px 20px",borderTop:"1px solid "+C.gold+"44",borderBottom:"1px solid "+C.gold+"44"}}>
            <span style={{fontSize:13,fontWeight:700,color:C.gold}}>{mo.y}年度</span>
          </div>}
          <div style={{display:"flex",borderBottom:"1px solid "+C.border,minHeight:56,opacity:isPast?0.5:1,background:isCur?"rgba(51,65,85,0.5)":"transparent"}}>
            <div style={{width:72,minWidth:72,padding:"10px 0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRight:"1px solid "+C.border,flexShrink:0}}>
              <div style={{fontSize:20,fontWeight:700,color:isCur?C.gold:C.text}}>{mo.m}</div>
              <div style={{fontSize:9,color:isCur?C.gold:C.textMuted}}>{mo.y}</div>
              {isCur&&<div style={{width:6,height:6,borderRadius:"50%",background:C.gold,marginTop:2}}/>}
            </div>
            <div style={{flex:1,padding:"6px 12px",display:"flex",flexDirection:"column",gap:4,justifyContent:"center",minHeight:56}}>
              {items.length===0?
                <div style={{fontSize:12,color:C.textMuted,fontStyle:"italic"}}>—</div>
              :items.map(function(it){return <div key={it.id} style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:3,height:18,borderRadius:2,background:catColor[it.category]||C.gold,flexShrink:0}}/>
                <span style={{fontSize:13,fontWeight:500,flex:1}}>{it.text}</span>
                <span style={S.badge(catColor[it.category])}>{catLabel[it.category]}</span>
                <button style={S.btnI} onClick={function(){openEditItem(it);}}><I name="edit" size={14} color={C.textMuted}/></button>
                <button style={S.btnI} onClick={function(){rmItem(it.id);}}><I name="trash" size={14} color={C.red}/></button>
              </div>;})}
            </div>
            <div style={{display:"flex",alignItems:"center",padding:"0 8px",flexShrink:0}}>
              <button style={{background:C.bgHover,borderRadius:6,padding:6,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={function(){openAddItem(mo.key);}}>
                <I name="plus" size={16} color={C.gold}/>
              </button>
            </div>
          </div>
        </Fragment>;
      })}
    </div>
    {itemModal&&<Modal title={editItem?"予定を編集":"月の予定を追加"} onClose={function(){setItemModal(false);}}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div><label style={S.lbl}>月</label><select style={Object.assign({},S.sel,{width:"100%"})} value={iF.month} onChange={function(e){setIF(Object.assign({},iF,{month:e.target.value}));}}><MonthOpts/></select></div>
        <div><label style={S.lbl}>内容</label><input style={S.inp} value={iF.text} onChange={function(e){setIF(Object.assign({},iF,{text:e.target.value}));}} placeholder="例：院試、卒論、就活開始"/></div>
        <div><label style={S.lbl}>カテゴリ</label><select style={Object.assign({},S.sel,{width:"100%"})} value={iF.category} onChange={function(e){setIF(Object.assign({},iF,{category:e.target.value}));}}><CatOptions/></select></div>
        <button style={Object.assign({},S.btn(),{width:"100%",justifyContent:"center",marginTop:8})} onClick={saveItem}>{editItem?"更新":"追加"}</button>
      </div>
    </Modal>}
    {rangeModal&&<Modal title={editRange?"期間を編集":"期間を追加（⇔）"} onClose={function(){setRangeModal(false);}}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={S.g2}>
          <div><label style={S.lbl}>開始月</label><select style={Object.assign({},S.sel,{width:"100%"})} value={rF.startMonth} onChange={function(e){setRF(Object.assign({},rF,{startMonth:e.target.value}));}}><MonthOpts/></select></div>
          <div><label style={S.lbl}>終了月</label><select style={Object.assign({},S.sel,{width:"100%"})} value={rF.endMonth} onChange={function(e){setRF(Object.assign({},rF,{endMonth:e.target.value}));}}><MonthOpts/></select></div>
        </div>
        <div><label style={S.lbl}>内容</label><input style={S.inp} value={rF.text} onChange={function(e){setRF(Object.assign({},rF,{text:e.target.value}));}} placeholder="例：街ツク活動期間"/></div>
        <div><label style={S.lbl}>カテゴリ</label><select style={Object.assign({},S.sel,{width:"100%"})} value={rF.category} onChange={function(e){setRF(Object.assign({},rF,{category:e.target.value}));}}><CatOptions/></select></div>
        <div style={{fontSize:12,color:C.textMuted,background:C.bgHover,borderRadius:8,padding:"8px 12px"}}>
          {monthIdx(rF.startMonth)>=0&&monthIdx(rF.endMonth)>=0&&monthIdx(rF.startMonth)<=monthIdx(rF.endMonth)
            ? "⇔ "+(allMonths[monthIdx(rF.startMonth)]||{}).label+" 〜 "+(allMonths[monthIdx(rF.endMonth)]||{}).label+" ("+(monthIdx(rF.endMonth)-monthIdx(rF.startMonth)+1)+"ヶ月間)"
            : "開始月は終了月より前にしてください"}
        </div>
        <button style={Object.assign({},S.btn(),{width:"100%",justifyContent:"center",marginTop:8})} onClick={saveRange}>{editRange?"更新":"追加"}</button>
      </div>
    </Modal>}
  </div>;
};

/* ===== MAIN APP ===== */
var App=function(){
  var mobile = useIsMobile(900);
  var saved = useMemo(function(){return loadData();},[]);
  var _pg=useState("dashboard"), pg=_pg[0], sPg=_pg[1];
  var _events=useState(saved&&saved.events?saved.events:SAMPLE_EVENTS), events=_events[0], setEvents=_events[1];
  var _tasks=useState(saved&&saved.tasks?saved.tasks:SAMPLE_TASKS), tasks=_tasks[0], setTasks=_tasks[1];
  var _notes=useState(saved&&saved.notes?saved.notes:SAMPLE_NOTES), notes=_notes[0], setNotes=_notes[1];
  var _habits=useState(saved&&saved.habits?saved.habits:SAMPLE_HABITS), habits=_habits[0], setHabits=_habits[1];
  var _hLog=useState(function(){return saved&&saved.habitLog?saved.habitLog:genSampleLog();}), hLog=_hLog[0], setHLog=_hLog[1];
  var _rmI=useState(saved&&saved.roadmapItems?saved.roadmapItems:[]), roadmapItems=_rmI[0], setRoadmapItems=_rmI[1];
  var _rmR=useState(saved&&saved.roadmapRanges?saved.roadmapRanges:[]), roadmapRanges=_rmR[0], setRoadmapRanges=_rmR[1];

  useEffect(function(){saveData({events:events,tasks:tasks,notes:notes,habits:habits,habitLog:hLog,roadmapItems:roadmapItems,roadmapRanges:roadmapRanges});},[events,tasks,notes,habits,hLog,roadmapItems,roadmapRanges]);

  var impAll=useCallback(function(d){if(d.events)setEvents(d.events);if(d.tasks)setTasks(d.tasks);if(d.notes)setNotes(d.notes);if(d.habits)setHabits(d.habits);if(d.habitLog)setHLog(d.habitLog);if(d.roadmapItems)setRoadmapItems(d.roadmapItems);if(d.roadmapRanges)setRoadmapRanges(d.roadmapRanges);},[]);
  var expD=function(){var d=JSON.stringify({events:events,tasks:tasks,notes:notes,habits:habits,habitLog:hLog,roadmapItems:roadmapItems,roadmapRanges:roadmapRanges},null,2);var b=new Blob([d],{type:"application/json"});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download="planner-backup-"+todayStr+".json";a.click();URL.revokeObjectURL(u);};
  var impF=function(e){var file=e.target.files[0];if(!file)return;var r=new FileReader();r.onload=function(ev){try{impAll(JSON.parse(ev.target.result));}catch(err){alert("読み込み失敗");}};r.readAsText(file);};
  var nav=[
    {id:"dashboard",label:"ホーム",icon:"home"},
    {id:"schedule",label:"予定",icon:"calendar"},
    {id:"tasks",label:"タスク",icon:"checkSquare"},
    {id:"notes",label:"メモ",icon:"bookOpen"},
    {id:"habits",label:"習慣",icon:"target"},
    {id:"roadmap",label:"計画",icon:"roadmap"},
  ];
  var content = <Fragment>
    {pg==="dashboard"&&<Dashboard events={events} tasks={tasks} habits={habits} habitLog={hLog} notes={notes} mobile={mobile}/>}
    {pg==="schedule"&&<Schedule events={events} setEvents={setEvents}/>}
    {pg==="tasks"&&<Tasks tasks={tasks} setTasks={setTasks}/>}
    {pg==="notes"&&<Notes notes={notes} setNotes={setNotes}/>}
    {pg==="habits"&&<Habits habits={habits} setHabits={setHabits} habitLog={hLog} setHabitLog={setHLog}/>}
    {pg==="roadmap"&&<Roadmap roadmapItems={roadmapItems} setRoadmapItems={setRoadmapItems} roadmapRanges={roadmapRanges} setRoadmapRanges={setRoadmapRanges}/>}
  </Fragment>;
  if (mobile) {
    return <div style={S.appMobile}>
      {/* Header bar */}
      <div style={{background:C.bgCard,borderBottom:"1px solid "+C.border,padding:"8px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div><span style={{fontSize:15,fontWeight:700,color:C.gold,letterSpacing:1}}>EXECUTIVE</span></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button style={Object.assign({},S.btn(),{padding:"6px 10px",fontSize:12})} onClick={expD}><I name="download" size={12} color={C.bg}/></button>
          <label style={Object.assign({},S.btnO,{padding:"6px 10px",fontSize:12})}><I name="upload" size={12}/><input type="file" accept=".json" onChange={impF} style={{display:"none"}}/></label>
        </div>
      </div>
      {/* Top tab bar */}
      <div style={{background:C.bgCard,borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-around",flexShrink:0,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        {nav.map(function(n){
          var active=pg===n.id;
          return <button key={n.id} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 8px",cursor:"pointer",color:active?C.gold:C.textMuted,fontSize:12,fontWeight:active?700:400,background:"transparent",border:"none",borderBottom:active?"2px solid "+C.gold:"2px solid transparent",whiteSpace:"nowrap",flex:1,justifyContent:"center",transition:"all 0.2s"}} onClick={function(){sPg(n.id);}}>
            <I name={n.icon} size={16} color={active?C.gold:C.textMuted}/>
            <span>{n.label}</span>
          </button>;
        })}
      </div>
      {/* Content */}
      <div className="scroll-area" style={S.mainMobile}>{content}</div>
    </div>;
  }
  return <div style={S.app}>
    <div style={S.sidebar}>
      <div style={{padding:"24px 20px 16px",borderBottom:"1px solid "+C.border}}>
        <div style={{fontSize:20,fontWeight:700,color:C.gold,letterSpacing:1}}>EXECUTIVE</div>
        <div style={{fontSize:11,color:C.textMuted,marginTop:4,letterSpacing:2,textTransform:"uppercase"}}>Personal Planner</div>
      </div>
      <div style={{padding:"12px 0",flex:1}}>
        {nav.map(function(n){return <button key={n.id} style={S.navItem(pg===n.id)} onClick={function(){sPg(n.id);}}><I name={n.icon} size={18}/><span>{n.label}</span></button>;})}
      </div>
      <div style={{padding:"16px 20px",borderTop:"1px solid "+C.border}}>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <button style={S.btn()} onClick={expD}><I name="download" size={14} color={C.bg}/> エクスポート</button>
          <label style={S.btnO}><I name="upload" size={14}/> インポート<input type="file" accept=".json" onChange={impF} style={{display:"none"}}/></label>
        </div>
      </div>
    </div>
    <div className="scroll-area" style={S.main}>{content}</div>
  </div>;
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
